<!doctype html>
<html lang="ko">
<head>

  <title>백엔드 10년차 이상 개발자 Interview 학습 목록</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

      border-radius: 8px;
      margin-bottom: 0.75rem;
      background: var(--surface);
    }
    a {
      display: flex;
      align-items: center;
      padding: 1rem 1.2rem;
      text-decoration: none;
      color: var(--text);
      gap: 1rem;
    }
    a:hover { background: #232635; border-radius: 8px; }
    .day {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

</head>
<body>

  <ul>
    <li>

        <div>
          <div class="title">시스템 설계 기초 — URL Shortener 전체 설계</div>
          <div class="subtitle">요구사항 분석, 해시 전략, 캐싱, DB 선택, 가용성, SPOF 진단</div>
        </div>
